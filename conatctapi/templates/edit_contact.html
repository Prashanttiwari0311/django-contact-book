<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Contact</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
            padding:20px;
        }

        .container{
            width:100%;
            max-width:500px;
        }

        .card{
            background:#fff;
            padding:35px;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.15);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:500;
            color:#444;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#667eea;
            box-shadow:0 0 5px rgba(102,126,234,.3);
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
        }

        .btn:hover{
            opacity:.9;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#667eea;
            font-weight:500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <h2>✏️ Edit Contact</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Name</label>
                <input
                    type="text"
                    name="name"
                    value="{{ contact.name }}"
                    required
                >
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input
                    type="text"
                    name="phone"
                    value="{{ contact.phone }}"
                    maxlength="10"
                    required
                >
            </div>

            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    value="{{ contact.email }}"
                    required
                >
            </div>

            <button type="submit" class="btn">
                Update Contact
            </button>

        </form>

        <a href="{% url 'contact_list' %}" class="back">
            ← Back to Contact List
        </a>

    </div>
</div>

</body>
</html>

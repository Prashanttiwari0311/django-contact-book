<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% if contact %}
            Update Contact
        {% else %}
            Add Contact
        {% endif %}
    </title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
            padding:20px;
        }

        .container{
            width:100%;
            max-width:500px;
        }

        .card{
            background:#fff;
            border-radius:20px;
            padding:35px;
            box-shadow:0 15px 40px rgba(0,0,0,0.15);
        }

        .title{
            text-align:center;
            margin-bottom:25px;
        }

        .title h2{
            color:#333;
            margin-bottom:5px;
        }

        .title p{
            color:#777;
            font-size:14px;
        }

        .form-group{
            margin-bottom:20px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            color:#444;
            font-weight:500;
        }

        .form-group input{
            width:100%;
            padding:14px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:15px;
            transition:.3s;
        }

        .form-group input:focus{
            outline:none;
            border-color:#667eea;
            box-shadow:0 0 8px rgba(102,126,234,.3);
        }

        .btn{
            width:100%;
            border:none;
            padding:14px;
            border-radius:10px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
        }

        .back-btn{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#667eea;
            font-weight:500;
        }

        .back-btn:hover{
            text-decoration:underline;
        }

        .required{
            color:red;
        }

        @media(max-width:600px){
            .card{
                padding:25px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="title">
            {% if contact %}
                <h2>✏️ Update Contact</h2>
                <p>Edit contact information</p>
            {% else %}
                <h2>➕ Add New Contact</h2>
                <p>Create a new contact in your contact book</p>
            {% endif %}
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>
                    Full Name <span class="required">*</span>
                </label>

                <input
                    type="text"
                    name="name"
                    placeholder="Enter full name"
                    value="{{ contact.name|default:'' }}"
                    required
                >
            </div>

            <div class="form-group">
                <label>
                    Phone Number <span class="required">*</span>
                </label>

                <input
                    type="text"
                    name="phone"
                    placeholder="Enter 10-digit phone number"
                    maxlength="10"
                    value="{{ contact.phone|default:'' }}"
                    required
                >
            </div>

            <div class="form-group">
                <label>
                    Email Address <span class="required">*</span>
                </label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter email address"
                    value="{{ contact.email|default:'' }}"
                    required
                >
            </div>

            <button type="submit" class="btn">

                {% if contact %}
                    Update Contact
                {% else %}
                    Save Contact
                {% endif %}

            </button>

        </form>

        <a href="{% url 'contact_list' %}" class="back-btn">
            ← Back to Contact List
        </a>

    </div>

</div>

</body>
</html>
